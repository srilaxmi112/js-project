<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">RecipeApp</div>
        <ul class="nav-links">
            <li><a href="#" class="active">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <header>
        <h1 id="welcomeGreeting">Hello, Chef!</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Enter ingredient (e.g., chicken)">
            <button id="searchBtn">Search</button>
        </div>
    </header>

    <main id="results-grid" class="recipe-grid">
        <p class="placeholder-text">Type an ingredient and click Search to see recipes.</p>
    </main>

    <script src="script.js"></script>
    <script>
        const name = localStorage.getItem('chefName') || 'Chef';
        document.getElementById('welcomeGreeting').innerText = `Hello, ${name}!`;
    </script>
</body>
</html>
